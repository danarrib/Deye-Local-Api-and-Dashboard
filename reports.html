<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<script>
// ─── State ───────────────────────────────────────────────────────────────────

let presets      = [];   // [{label, from, to, suggestB}]
let allInverters = [];   // [{device_sn, friendly_name}]
let reportChart  = null;
let southern     = false;

// Validated locale — navigator.language can be the string "undefined" in some
// headless environments, which toLocaleDateString rejects as an invalid tag.
const safeLocale = (() => {
  try { new Intl.DateTimeFormat(navigator.language); return navigator.language; } catch(e) { return []; }
})();

// ─── Init ────────────────────────────────────────────────────────────────────

detectAndSetDarkMode();

i18nInit().then(() => {
  fetch('reports.php?action=config')
    .then(r => r.json())
    .then(cfg => {
      southern     = (parseFloat(cfg.latitude) < 0);
      allInverters = cfg.inverters || [];
      presets      = buildPresets(southern);
      populatePresetDropdowns();
      renderInverterCheckboxes('a', allInverters);
      renderInverterCheckboxes('b', allInverters);
      applyPreset('a', presets.find(p => p.value === 'last30'));
    })
    .catch(() => {
      presets = buildPresets(false);
      populatePresetDropdowns();
      applyPreset('a', presets.find(p => p.value === 'last30'));
    });
});

// ─── Dark mode ───────────────────────────────────────────────────────────────

function getTheme() {
  return localStorage.getItem('deye_theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-bs-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('deye_theme', next);
  applyTheme(next);
}

function detectAndSetDarkMode() {
  applyTheme(getTheme());
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (!localStorage.getItem('deye_theme')) applyTheme(getTheme());
  });
}

// ─── Preset builder ──────────────────────────────────────────────────────────

function feb29(y) { return (y % 4 === 0 && (y % 100 !== 0 || y % 400 === 0)) ? 29 : 28; }
function pad(n)   { return String(n).padStart(2, '0'); }
function ymd(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }

function getSeasonDates(year, name, isSouthern) {
  if (!isSouthern) {
    if (name === 'Spring') return { from: ymd(year,3,1),   to: ymd(year,5,31)          };
    if (name === 'Summer') return { from: ymd(year,6,1),   to: ymd(year,8,31)          };
    if (name === 'Autumn') return { from: ymd(year,9,1),   to: ymd(year,11,30)         };
    if (name === 'Winter') return { from: ymd(year,12,1),  to: ymd(year+1,2,feb29(year+1)) };
  } else {
    if (name === 'Summer') return { from: ymd(year-1,12,1), to: ymd(year,2,feb29(year))  };
    if (name === 'Autumn') return { from: ymd(year,3,1),    to: ymd(year,5,31)           };
    if (name === 'Winter') return { from: ymd(year,6,1),    to: ymd(year,8,31)           };
    if (name === 'Spring') return { from: ymd(year,9,1),    to: ymd(year,11,30)          };
  }
}

function buildPresets(isSouthern) {
  const today = new Date();
  const Y = today.getFullYear();
  const todayStr = ymd(Y, today.getMonth()+1, today.getDate());

  function rolling(days) {
    const d = new Date(today);
    d.setDate(d.getDate() - days + 1);
    return { from: ymd(d.getFullYear(), d.getMonth()+1, d.getDate()), to: todayStr };
  }

  function todayRange() { return { from: todayStr, to: todayStr }; }
  function yesterdayRange() {
    const d = new Date(today); d.setDate(d.getDate() - 1);
    const s = ymd(d.getFullYear(), d.getMonth()+1, d.getDate());
    return { from: s, to: s };
  }
  function dayBeforeYesterdayRange() {
    const d = new Date(today); d.setDate(d.getDate() - 2);
    const s = ymd(d.getFullYear(), d.getMonth()+1, d.getDate());
    return { from: s, to: s };
  }
  function thisMonth() { return { from: ymd(Y, today.getMonth()+1, 1), to: todayStr }; }
  function lastMonth() {
    const m = today.getMonth(); // 0-indexed prev month
    const y = m === 0 ? Y-1 : Y;
    const mo = m === 0 ? 12 : m;
    const last = new Date(y, mo, 0).getDate();
    return { from: ymd(y, mo, 1), to: ymd(y, mo, last) };
  }
  function monthBeforeLast() {
    const d = new Date(Y, today.getMonth() - 2, 1); // JS handles month underflow
    const y = d.getFullYear(), m = d.getMonth();
    const last = new Date(y, m + 1, 0).getDate();
    return { from: ymd(y, m+1, 1), to: ymd(y, m+1, last) };
  }
  function thisYearYTD()  { return { from: ymd(Y,1,1),   to: todayStr }; }
  function lastYearYTD()  { return { from: ymd(Y-1,1,1), to: ymd(Y-1, today.getMonth()+1, today.getDate()) }; }
  function lastFullYear() { return { from: ymd(Y-1,1,1), to: ymd(Y-1,12,31) }; }

  function quarter(y, q) {
    const starts = [[1,1],[4,1],[7,1],[10,1]];
    const ends   = [[3,31],[6,30],[9,30],[12,31]];
    return { from: ymd(y,...starts[q-1]), to: ymd(y,...ends[q-1]) };
  }

  // Season order within each year, most recent first
  const seasonOrder = isSouthern
    ? ['Spring','Winter','Autumn','Summer']   // Sep, Jun, Mar, Dec(prev year)
    : ['Winter','Autumn','Summer','Spring'];  // Dec, Sep, Jun, Mar

  const list = [];

  // Days
  list.push({ label: t('preset_today'),              value: 'today',              ...todayRange()              });
  list.push({ label: t('preset_yesterday'),          value: 'yesterday',          ...yesterdayRange()          });
  list.push({ label: t('preset_daybeforeyesterday'), value: 'daybeforeyesterday', ...dayBeforeYesterdayRange() });

  // Rolling
  list.push({ label:t('preset_last7'),    value:'last7',   suggestB:'last7_prev',   ...rolling(7)   });
  list.push({ label:t('preset_last30'),   value:'last30',  suggestB:'last30_prev',  ...rolling(30)  });
  list.push({ label:t('preset_last90'),   value:'last90',  suggestB:'last90_prev',  ...rolling(90)  });
  list.push({ label:t('preset_last365'),  value:'last365', suggestB:'last365_prev', ...rolling(365) });

  // Rolling companions (hidden — used only as suggestB targets)
  list.push({ label:t('preset_last7_prev'),    value:'last7_prev',   hidden:true, ...shiftYearBack(rolling(7))   });
  list.push({ label:t('preset_last30_prev'),   value:'last30_prev',  hidden:true, ...shiftYearBack(rolling(30))  });
  list.push({ label:t('preset_last90_prev'),   value:'last90_prev',  hidden:true, ...shiftYearBack(rolling(90))  });
  list.push({ label:t('preset_last365_prev'),  value:'last365_prev', hidden:true, ...shiftYearBack(rolling(365)) });

  // Calendar
  list.push({ label:t('preset_thismonth'),       value:'thismonth',       ...thisMonth()       });
  list.push({ label:t('preset_lastmonth'),       value:'lastmonth',       ...lastMonth()       });
  list.push({ label:t('preset_monthbeforelast'), value:'monthbeforelast', ...monthBeforeLast() });
  list.push({ label:t('preset_thisyearytd'),     value:'thisyearytd',     ...thisYearYTD()     });
  list.push({ label:t('preset_lytd'),            value:'lytd',            ...lastYearYTD()     });
  list.push({ label:t('preset_lastfullyear'),    value:'lastfullyear',    ...lastFullYear()    });

  // Quarters: year DESC, q DESC within year — clean ordering with no inline companions
  for (let y = Y; y >= Y-2; y--) {
    for (let q = 4; q >= 1; q--) {
      const d = quarter(y, q);
      if (d.from > todayStr) continue;
      list.push({ label:`Q${q} ${y}`, value:`q${q}_${y}`, suggestB:`q${q}_${y-1}`, ...d });
    }
  }
  // Hidden companions for the oldest visible year's suggestB targets
  for (let q = 4; q >= 1; q--) {
    const val = `q${q}_${Y-3}`;
    if (!list.find(p => p.value === val)) {
      list.push({ label:`Q${q} ${Y-3}`, value:val, hidden:true, ...quarter(Y-3, q) });
    }
  }

  // Seasons: year DESC, season order (most recent first) within year
  for (let y = Y; y >= Y-2; y--) {
    for (const name of seasonOrder) {
      const d = getSeasonDates(y, name, isSouthern);
      if (!d || d.from > todayStr) continue;
      const val = `${name.toLowerCase()}_${y}`;
      if (!list.find(p => p.value === val)) {
        list.push({ label:`${t('season_' + name.toLowerCase())} ${y}`, value:val, suggestB:`${name.toLowerCase()}_${y-1}`, ...d });
      }
    }
  }
  // Hidden companions for the oldest visible year's suggestB targets
  for (const name of seasonOrder) {
    const val = `${name.toLowerCase()}_${Y-3}`;
    if (!list.find(p => p.value === val)) {
      const d = getSeasonDates(Y-3, name, isSouthern);
      if (d) list.push({ label:`${t('season_' + name.toLowerCase())} ${Y-3}`, value:val, hidden:true, ...d });
    }
  }

  return list;
}

function shiftYearBack(range) {
  const shiftDate = s => {
    const d = new Date(s + 'T12:00:00');
    d.setFullYear(d.getFullYear() - 1);
    return ymd(d.getFullYear(), d.getMonth()+1, d.getDate());
  };
  return { from: shiftDate(range.from), to: shiftDate(range.to) };
}

// ─── Preset dropdowns ────────────────────────────────────────────────────────

// Presets visible in the dropdown (exclude hidden companion presets)
function visiblePresets() {
  return presets.filter(p => !p.hidden);
}

function populatePresetDropdowns() {
  const visible = visiblePresets();

  // Groups for optgroup
  const groups = [
    { label: t('optgroup_days'),      values: ['today','yesterday','daybeforeyesterday'] },
    { label: t('optgroup_rolling'),   values: ['last7','last30','last90','last365'] },
    { label: t('optgroup_calendar'),  values: ['thismonth','lastmonth','monthbeforelast','thisyearytd','lytd','lastfullyear'] },
    { label: t('optgroup_quarters'),  fn: p => p.value.startsWith('q') },
    { label: t('optgroup_seasons'),   fn: p => ['spring','summer','autumn','winter'].some(s => p.value.startsWith(s)) },
  ];

  function buildOptions(selectId, includeNone) {
    const sel = document.getElementById(selectId);
    sel.innerHTML = includeNone ? `<option value="">${t('select_none')}</option>` : `<option value="">${t('select_custom_range')}</option>`;

    for (const g of groups) {
      const members = g.values
        ? visible.filter(p => g.values.includes(p.value))
        : visible.filter(g.fn);
      if (!members.length) continue;
      const og = document.createElement('optgroup');
      og.label = g.label;
      members.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.value;
        opt.textContent = p.label;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    }
  }

  buildOptions('preset-a', false);
  buildOptions('preset-b', true);
}

function applyPreset(side, preset) {
  if (!preset) return;
  document.getElementById(`${side}-from`).value = preset.from;
  document.getElementById(`${side}-to`).value   = preset.to;
  const sel = document.getElementById(`preset-${side}`);
  if (sel) sel.value = preset.value || '';
  if (side === 'a') updateGroupWarning();
}

function clearPreset(side) {
  const sel = document.getElementById(`preset-${side}`);
  if (sel) sel.value = '';
}

function onPresetChange(side) {
  const val = document.getElementById(`preset-${side}`).value;
  if (!val) {
    if (side === 'b') {
      document.getElementById('b-from').value = '';
      document.getElementById('b-to').value   = '';
    }
    return;
  }
  const preset = presets.find(p => p.value === val);
  if (preset) {
    document.getElementById(`${side}-from`).value = preset.from;
    document.getElementById(`${side}-to`).value   = preset.to;
  }
  if (side === 'a') updateGroupWarning();
}

function updateGroupWarning() {
  const group = document.getElementById('group-by').value;
  const from  = document.getElementById('a-from').value;
  const to    = document.getElementById('a-to').value;
  const warn  = document.getElementById('group-warn');
  if (group === 'none' && from && to) {
    const days = (new Date(to) - new Date(from)) / 86400000;
    warn.style.display = days > 7 ? '' : 'none';
  } else {
    warn.style.display = 'none';
  }
}

function autoSuggestB() {
  const aVal = document.getElementById('preset-a').value;
  const bSel = document.getElementById('preset-b');

  // Only auto-suggest if B is still empty / unset
  if (bSel.value) return;

  const aPreset = presets.find(p => p.value === aVal);
  if (!aPreset || !aPreset.suggestB) return;

  const suggested = presets.find(p => p.value === aPreset.suggestB);
  if (!suggested) return;

  // Ensure the suggested value exists in the select
  let opt = bSel.querySelector(`option[value="${suggested.value}"]`);
  if (!opt) {
    // Add it (it's a companion preset not normally shown)
    opt = document.createElement('option');
    opt.value = suggested.value;
    opt.textContent = suggested.label;
    bSel.appendChild(opt);
  }

  bSel.value = suggested.value;
  document.getElementById('b-from').value = suggested.from;
  document.getElementById('b-to').value   = suggested.to;
}

// ─── Report execution ────────────────────────────────────────────────────────

async function runReport() {
  const aFrom     = document.getElementById('a-from').value;
  const aTo       = document.getElementById('a-to').value;
  const bFrom     = document.getElementById('b-from').value;
  const bTo       = document.getElementById('b-to').value;
  const group     = document.getElementById('group-by').value;
  const aTimeFrom = document.getElementById('a-time-from').value || '00:00';
  const aTimeTo   = document.getElementById('a-time-to').value   || '23:59';
  const bTimeFrom = document.getElementById('b-time-from').value || '00:00';
  const bTimeTo   = document.getElementById('b-time-to').value   || '23:59';

  clearAlert();

  if (!aFrom || !aTo) { showAlert(t('alert_set_range_a')); return; }
  if (aFrom > aTo)    { showAlert(t('alert_range_a_order')); return; }
  if ((bFrom || bTo) && !(bFrom && bTo)) { showAlert(t('alert_range_b_incomplete')); return; }
  if (bFrom && bTo && bFrom > bTo) { showAlert(t('alert_range_b_order')); return; }
  if (!hasSelectedInverters('a')) { showAlert(t('alert_select_inverter_a')); return; }
  if (bFrom && bTo && !hasSelectedInverters('b')) { showAlert(t('alert_select_inverter_b')); return; }

  document.getElementById('btn-run').disabled = true;
  document.getElementById('loading-indicator').style.display = '';

  let url = `reports.php?a_from=${aFrom}&a_to=${aTo}&group=${group}`
          + `&a_time_from=${encodeURIComponent(aTimeFrom)}&a_time_to=${encodeURIComponent(aTimeTo)}`;

  const aInv = getSelectedInverters('a');
  if (aInv.length) url += `&a_inverters=${encodeURIComponent(aInv.join(','))}`;

  if (bFrom && bTo) {
    url += `&b_from=${bFrom}&b_to=${bTo}`
         + `&b_time_from=${encodeURIComponent(bTimeFrom)}&b_time_to=${encodeURIComponent(bTimeTo)}`;
    const bInv = getSelectedInverters('b');
    if (bInv.length) url += `&b_inverters=${encodeURIComponent(bInv.join(','))}`;
  }

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (!resp.ok) { showAlert(data.error || t('alert_server_error')); return; }
    renderReport(data);
  } catch(e) {
    showAlert(t('alert_server_unreachable'));
  } finally {
    document.getElementById('btn-run').disabled = false;
    document.getElementById('loading-indicator').style.display = 'none';
  }
}

// ─── Rendering ───────────────────────────────────────────────────────────────

function renderReport(data) {
  const rangeA = data.range_a;
  const rangeB = data.range_b || null;

  renderSummary(rangeA, rangeB);
  renderChart(rangeA, rangeB);
  renderTable(rangeA, rangeB);

  document.getElementById('summary-section').style.display = '';
  document.getElementById('chart-section').style.display   = '';
  document.getElementById('table-section').style.display   = '';
}

// — Summary cards —

function renderSummary(a, b) {
  const container = document.getElementById('summary-cards');
  container.innerHTML = '';

  const s = a.summary;
  const summaryB = b ? b.summary : null;

  const cards = [
    {
      label:    t('summary_total_energy'),
      valA:     `${s.total_energy_kwh} kWh`,
      valB:     summaryB ? `${summaryB.total_energy_kwh} kWh` : null,
      delta:    summaryB ? pctDelta(s.total_energy_kwh, summaryB.total_energy_kwh) : null,
    },
    {
      label:    t('summary_daily_avg'),
      valA:     `${s.daily_avg_kwh} kWh`,
      valB:     summaryB ? `${summaryB.daily_avg_kwh} kWh` : null,
      delta:    summaryB ? pctDelta(s.daily_avg_kwh, summaryB.daily_avg_kwh) : null,
    },
    {
      label:    t('summary_peak_power'),
      valA:     s.peak_power_w ? `${s.peak_power_w.toLocaleString()} W` : '—',
      valB:     summaryB ? (summaryB.peak_power_w ? `${summaryB.peak_power_w.toLocaleString()} W` : '—') : null,
      delta:    summaryB ? pctDelta(s.peak_power_w, summaryB.peak_power_w) : null,
    },
    {
      label:    t('summary_avg_temp'),
      valA:     s.avg_temp !== null ? `${s.avg_temp}°C` : '—',
      valB:     summaryB ? (summaryB.avg_temp !== null ? `${summaryB.avg_temp}°C` : '—') : null,
      delta:    summaryB && s.avg_temp !== null && summaryB.avg_temp !== null
                  ? (() => { const diff = s.avg_temp - summaryB.avg_temp; const sign = diff > 0 ? '+' : ''; return { text: t('delta_temp_vs_b', {sign, diff}), cls: 'delta-neutral' }; })()
                  : null,
    },
    {
      label:    t('summary_avg_radiator_temp'),
      valA:     s.avg_radiator_temp !== null ? `${s.avg_radiator_temp}°C` : '—',
      valB:     summaryB ? (summaryB.avg_radiator_temp !== null ? `${summaryB.avg_radiator_temp}°C` : '—') : null,
      delta:    summaryB && s.avg_radiator_temp !== null && summaryB.avg_radiator_temp !== null
                  ? (() => { const diff = s.avg_radiator_temp - summaryB.avg_radiator_temp; const sign = diff > 0 ? '+' : ''; return { text: t('delta_temp_vs_b', {sign, diff}), cls: 'delta-neutral' }; })()
                  : null,
    },
    {
      label:    t('summary_dominant_weather'),
      valA:     conditionEmoji(s.dominant_condition) + ' ' + (s.dominant_condition ? translateCondition(s.dominant_condition) : '—'),
      valB:     summaryB ? conditionEmoji(summaryB.dominant_condition) + ' ' + (summaryB.dominant_condition ? translateCondition(summaryB.dominant_condition) : '—') : null,
      delta:    null,
    },
  ];

  cards.forEach(card => {
    const col = document.createElement('div');
    col.className = b ? 'col-12 col-md-6 col-xl-4' : 'col-6 col-md-4 col-xl-2';

    let inner = '';
    if (b) {
      inner = `
        <div class="card stat-card h-100">
          <div class="card-body py-2">
            <div class="text-muted small mb-1">${card.label}</div>
            <div class="d-flex gap-3 align-items-start flex-wrap">
              <div>
                <div class="badge bg-primary mb-1">A</div>
                <div class="fw-bold">${card.valA}</div>
              </div>
              <div>
                <div class="badge bg-warning text-dark mb-1">B</div>
                <div class="fw-bold">${card.valB}</div>
              </div>
            </div>
            ${card.delta ? `<div class="small mt-1 ${card.delta.cls}">${card.delta.text}</div>` : ''}
          </div>
        </div>`;
    } else {
      inner = `
        <div class="card stat-card single h-100">
          <div class="card-body py-2">
            <div class="text-muted small mb-1">${card.label}</div>
            <div class="fw-bold fs-5">${card.valA}</div>
          </div>
        </div>`;
    }
    col.innerHTML = inner;
    container.appendChild(col);
  });
}

function pctDelta(a, b) {
  if (!b) return null;
  const pct  = Math.round(((a - b) / b) * 100);
  const sign = pct >= 0 ? '+' : '';
  const cls  = pct > 0 ? 'delta-positive' : pct < 0 ? 'delta-negative' : 'delta-neutral';
  return { text: t('delta_vs_b', {sign, pct}), cls };
}

// — Chart —

function renderChart(a, b) {
  const ctx = document.getElementById('report-chart');
  if (reportChart) { reportChart.destroy(); reportChart = null; }

  const group       = a.group;
  const aData       = a.data;
  const bData       = b ? b.data : null;
  const chartType   = document.getElementById('chart-type').value;
  const showPower    = document.getElementById('chk-power').checked;
  const showPeakPower = document.getElementById('chk-peak-power').checked;
  const showAvgTemp  = document.getElementById('chk-avg-temp').checked;
  const showRadiator = document.getElementById('chk-radiator').checked;

  if (!showPower && !showPeakPower && !showAvgTemp && !showRadiator) return;

  const groupLabel = {
    hour:    t('chart_period_hour'),
    halfday: t('chart_period_halfday'),
    day:     t('chart_period_day'),
    week:    t('chart_period_week'),
    month:   t('chart_period_month'),
    year:    t('chart_period_year'),
    none:    t('chart_period_none'),
    pvinput: t('group_pvinput'),
  }[group] || group;
  const maxLen = Math.max(aData.length, bData ? bData.length : 0);

  const useRelative = bData && bData.length === aData.length && !['hour','halfday','pvinput'].includes(group);

  const labels = Array.from({ length: maxLen }, (_, i) => {
    if (useRelative) return `${groupLabel} ${i + 1}`;
    const src = i < aData.length ? aData[i] : (bData ? bData[i] : null);
    return src ? formatChartLabel(src.period_start, group) : `${groupLabel} ${i + 1}`;
  });

  const aInvSuffix = getInverterLabel('a');
  const bInvSuffix = b ? getInverterLabel('b') : '';
  const isDoughnut = chartType === 'doughnut';
  const isLine     = chartType === 'line';
  const useDualY   = (showPower || showPeakPower) && (showRadiator || showAvgTemp) && !isDoughnut;

  const sliceColors = Array.from({ length: maxLen }, (_, i) =>
    `hsla(${Math.round((i / Math.max(maxLen, 1)) * 360)}, 65%, 55%, 0.85)`
  );

  // Helper: build one dataset object
  function makeDataset(label, data, hexBorder, hexFill, yAxisID, extraOpts = {}) {
    return {
      label,
      data,
      backgroundColor: isDoughnut ? sliceColors : hexFill,
      borderColor: hexBorder,
      borderWidth: 1,
      ...(yAxisID ? { yAxisID } : {}),
      ...(isLine || extraOpts.forceLineStyle
        ? { fill: false, tension: 0.3, pointRadius: 3 }
        : {}),
      ...(extraOpts.spanGaps ? { spanGaps: true } : {}),
    };
  }

  const aEnergy    = Array.from({ length: maxLen }, (_, i) =>
    i < aData.length ? (parseFloat(aData[i].energy_kwh) || 0) : null);
  const aPeakPower = Array.from({ length: maxLen }, (_, i) =>
    i < aData.length && aData[i].peak_power_w ? parseFloat(aData[i].peak_power_w) : null);
  const aAvgTemp   = Array.from({ length: maxLen }, (_, i) =>
    i < aData.length && aData[i].avg_temp !== null && aData[i].avg_temp !== ''
      ? parseFloat(aData[i].avg_temp) : null);
  const aRadiator  = Array.from({ length: maxLen }, (_, i) =>
    i < aData.length && aData[i].avg_radiator_temp !== null && aData[i].avg_radiator_temp !== ''
      ? parseFloat(aData[i].avg_radiator_temp) : null);

  const datasets = [];
  const datasetSources = []; // parallel array: which source row array maps to each dataset

  const aLabel = b
    ? `${t('range_a')} (${a.from} → ${a.to})${aInvSuffix ? ': ' + aInvSuffix : ''}`
    : `${t('chart_energy_kwh')} (${a.from} → ${a.to})${aInvSuffix ? ' — ' + aInvSuffix : ''}`;

  if (showPower) {
    datasets.push(makeDataset(aLabel, aEnergy, 'rgb(54,162,235)', 'rgba(54,162,235,0.7)', useDualY ? 'y' : undefined));
    datasetSources.push(aData);
  }
  if (showPeakPower) {
    const ppLabel = b ? `${t('chk_peak_power')} A (${a.from} → ${a.to})` : `${t('chk_peak_power')} (${a.from} → ${a.to})`;
    datasets.push(makeDataset(ppLabel, aPeakPower, 'rgb(153,102,255)', 'rgba(153,102,255,0.7)', useDualY ? 'y' : undefined, { forceLineStyle: true, spanGaps: true }));
    datasetSources.push(aData);
  }
  if (showAvgTemp) {
    const atLabel = b ? `${t('chk_avg_temp')} A (${a.from} → ${a.to})` : `${t('chk_avg_temp')} (${a.from} → ${a.to})`;
    datasets.push(makeDataset(atLabel, aAvgTemp, 'rgb(255,205,86)', 'rgba(255,205,86,0.7)', useDualY ? 'y2' : undefined, { forceLineStyle: true, spanGaps: true }));
    datasetSources.push(aData);
  }
  if (showRadiator) {
    const rLabel = b ? `${t('chk_radiator_temp')} A (${a.from} → ${a.to})` : `${t('chk_radiator_temp')} (${a.from} → ${a.to})`;
    datasets.push(makeDataset(rLabel, aRadiator, 'rgb(255,99,132)', 'rgba(255,99,132,0.7)', useDualY ? 'y2' : undefined, { forceLineStyle: true, spanGaps: true }));
    datasetSources.push(aData);
  }

  if (bData) {
    const bEnergy    = Array.from({ length: maxLen }, (_, i) =>
      i < bData.length ? (parseFloat(bData[i].energy_kwh) || 0) : null);
    const bPeakPower = Array.from({ length: maxLen }, (_, i) =>
      i < bData.length && bData[i].peak_power_w ? parseFloat(bData[i].peak_power_w) : null);
    const bAvgTemp   = Array.from({ length: maxLen }, (_, i) =>
      i < bData.length && bData[i].avg_temp !== null && bData[i].avg_temp !== ''
        ? parseFloat(bData[i].avg_temp) : null);
    const bRadiator  = Array.from({ length: maxLen }, (_, i) =>
      i < bData.length && bData[i].avg_radiator_temp !== null && bData[i].avg_radiator_temp !== ''
        ? parseFloat(bData[i].avg_radiator_temp) : null);

    const bLabel = `${t('range_b')} (${b.from} → ${b.to})${bInvSuffix ? ': ' + bInvSuffix : ''}`;
    if (showPower) {
      datasets.push(makeDataset(bLabel, bEnergy, 'rgb(255,159,64)', 'rgba(255,159,64,0.7)', useDualY ? 'y' : undefined));
      datasetSources.push(bData);
    }
    if (showPeakPower) {
      const bppLabel = `${t('chk_peak_power')} B (${b.from} → ${b.to})`;
      datasets.push(makeDataset(bppLabel, bPeakPower, 'rgb(201,203,207)', 'rgba(201,203,207,0.7)', useDualY ? 'y' : undefined, { forceLineStyle: true, spanGaps: true }));
      datasetSources.push(bData);
    }
    if (showAvgTemp) {
      const batLabel = `${t('chk_avg_temp')} B (${b.from} → ${b.to})`;
      datasets.push(makeDataset(batLabel, bAvgTemp, 'rgb(255,166,0)', 'rgba(255,166,0,0.7)', useDualY ? 'y2' : undefined, { forceLineStyle: true, spanGaps: true }));
      datasetSources.push(bData);
    }
    if (showRadiator) {
      const rbLabel = `${t('chk_radiator_temp')} B (${b.from} → ${b.to})`;
      datasets.push(makeDataset(rbLabel, bRadiator, 'rgb(75,192,192)', 'rgba(75,192,192,0.7)', useDualY ? 'y2' : undefined, { forceLineStyle: true, spanGaps: true }));
      datasetSources.push(bData);
    }
  }

  const tooltipAfterLabel = (tooltipCtx) => {
    const src = datasetSources[tooltipCtx.datasetIndex];
    const row = src ? src[tooltipCtx.dataIndex] : null;
    if (!row) return '';
    const lines = [];
    if (row.period_start) lines.push(`Period: ${formatChartLabel(row.period_start, group)}`);
    if (row.peak_power_w) lines.push(`Peak: ${parseInt(row.peak_power_w).toLocaleString()} W`);
    if (row.avg_temp !== null && row.avg_temp !== '') lines.push(`Avg temp: ${row.avg_temp}°C`);
    if (row.avg_radiator_temp !== null && row.avg_radiator_temp !== '') lines.push(`Radiator: ${row.avg_radiator_temp}°C`);
    if (row.dominant_condition) lines.push(`Weather: ${conditionEmoji(row.dominant_condition)} ${translateCondition(row.dominant_condition)}`);
    return lines;
  };

  const hasLeftSeries  = showPower || showPeakPower;
  const leftAxisTitle  = showPower && showPeakPower ? `${t('chart_energy_kwh')} / W`
                       : showPower ? t('chart_energy_kwh')
                       : showPeakPower ? 'W'
                       : '°C';
  const scales = isDoughnut ? {} : {
    y: {
      beginAtZero: hasLeftSeries,
      title: { display: useDualY || hasLeftSeries, text: leftAxisTitle },
    },
    ...(useDualY ? {
      y2: {
        position: 'right',
        grid: { drawOnChartArea: false },
        title: { display: true, text: '°C' },
      }
    } : {}),
  };

  reportChart = new Chart(ctx, {
    type: chartType,
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: { tooltip: { callbacks: { afterLabel: tooltipAfterLabel } } },
      ...(isDoughnut ? {} : { scales }),
    }
  });
}

  if (b) {
    thead.innerHTML = `<tr>
      <th>${t('table_period')}</th>

      <th class="text-primary">${t('table_peak_a')}</th>
      <th class="text-warning">${t('table_peak_b')}</th>
      <th class="text-primary">${t('table_temp_a')}</th>
      <th class="text-warning">${t('table_temp_b')}</th>

      <th class="text-warning">${t('table_radiator_temp_b')}</th>

      <th class="text-warning">${t('table_weather_b')}</th>

      const eb = rb ? parseFloat(rb.energy_kwh) : null;
      let delta = '—';
      if (ea !== null && eb !== null && eb !== 0) {
        const pct = Math.round(((ea - eb) / eb) * 100);

        delta = `<span class="${cls}">${pct > 0 ? '+' : ''}${pct}%</span>`;
      }

      tr.innerHTML = `
        <td class="text-nowrap small">
          ${ra ? `<span class="text-primary">${formatPeriodLabel(ra.period_start, group)}</span>` : '—'}<br>
          ${rb ? `<span class="text-warning">${formatPeriodLabel(rb.period_start, group)}</span>` : '—'}
        </td>
        <td>${ea !== null ? ea : '—'}</td>
        <td>${eb !== null ? eb : '—'}</td>
        <td>${delta}</td>
        <td>${ra && ra.peak_power_w ? parseInt(ra.peak_power_w).toLocaleString() : '—'}</td>
        <td>${rb && rb.peak_power_w ? parseInt(rb.peak_power_w).toLocaleString() : '—'}</td>
        <td>${ra && ra.avg_temp !== null && ra.avg_temp !== '' ? ra.avg_temp + '°C' : '—'}</td>
        <td>${rb && rb.avg_temp !== null && rb.avg_temp !== '' ? rb.avg_temp + '°C' : '—'}</td>
        <td>${ra && ra.avg_radiator_temp !== null && ra.avg_radiator_temp !== '' ? ra.avg_radiator_temp + '°C' : '—'}</td>
        <td>${rb && rb.avg_radiator_temp !== null && rb.avg_radiator_temp !== '' ? rb.avg_radiator_temp + '°C' : '—'}</td>
        <td class="small">${ra && ra.dominant_condition ? conditionEmoji(ra.dominant_condition)+' '+translateCondition(ra.dominant_condition) : '—'}</td>
        <td class="small">${rb && rb.dominant_condition ? conditionEmoji(rb.dominant_condition)+' '+translateCondition(rb.dominant_condition) : '—'}</td>
      `;
      tbody.appendChild(tr);
    }
  } else {
    thead.innerHTML = `<tr>
      <th>${t('table_period')}</th>
      <th>${t('table_energy')}</th>
      <th>${t('table_peak_power')}</th>
      <th>${t('table_avg_temp')}</th>
      <th>${t('table_radiator_temp')}</th>
      <th>${t('table_dominant_weather')}</th>
    </tr>`;
    tbody.innerHTML = a.data.map(r => `
      <tr>
        <td class="text-nowrap small">${formatPeriodLabel(r.period_start, group)}</td>
        <td>${parseFloat(r.energy_kwh) || '—'}</td>
        <td>${r.peak_power_w ? parseInt(r.peak_power_w).toLocaleString() : '—'}</td>
        <td>${r.avg_temp !== null && r.avg_temp !== '' ? r.avg_temp + '°C' : '—'}</td>
        <td>${r.avg_radiator_temp !== null && r.avg_radiator_temp !== '' ? r.avg_radiator_temp + '°C' : '—'}</td>
        <td class="small">${r.dominant_condition ? conditionEmoji(r.dominant_condition)+' '+translateCondition(r.dominant_condition) : '—'}</td>
      </tr>`).join('');
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────

function formatChartLabel(dateStr, group) {
  if (!dateStr) return '—';
  if (group === 'halfday') return dateStr === 'morning' ? t('period_morning') : t('period_afternoon');
  if (group === 'hour' || group === 'pvinput') return dateStr;
  if (group === 'none') return dateStr.length > 10 ? dateStr.slice(11) : dateStr;
  const d    = new Date(dateStr + 'T12:00:00');
  const mm   = String(d.getMonth() + 1).padStart(2, '0');
  const dd   = String(d.getDate()).padStart(2, '0');
  const yyyy = d.getFullYear();
  if (group === 'year')  return String(yyyy);
  if (group === 'month') return `${mm}/${yyyy}`;
  if (group === 'week')  return t('chart_week_label', {date: `${mm}/${dd}/${yyyy}`});
  return `${mm}/${dd}/${yyyy}`;
}

function formatPeriodLabel(dateStr, group) {
  if (!dateStr) return '—';
  if (group === 'halfday') return dateStr === 'morning' ? t('period_morning') : t('period_afternoon');
  if (group === 'hour' || group === 'pvinput') return dateStr;
  if (group === 'none')    return dateStr;
  const d      = new Date(dateStr + 'T12:00:00');
  const locale = safeLocale;
  if (group === 'year')  return String(d.getFullYear());
  if (group === 'month') return d.toLocaleDateString(locale, { year:'numeric', month:'short' });
  if (group === 'week')  return t('period_week_of', {date: d.toLocaleDateString(locale, { month:'short', day:'numeric', year:'numeric' })});
  return d.toLocaleDateString(locale, { month:'short', day:'numeric', year:'numeric' });
}

function conditionEmoji(condition) {
  if (!condition) return '';
  const c = condition.toLowerCase();
  if (c === 'clear sky' || c === 'mainly clear') return '☀️';
  if (c === 'partly cloudy')  return '🌤️';
  if (c === 'overcast')       return '☁️';
  if (c.includes('fog'))      return '🌫️';
  if (c.includes('thunder') || c.includes('storm')) return '⛈️';
  if (c.includes('snow'))     return '❄️';
  if (c.includes('drizzle') || c.includes('rain') || c.includes('shower')) return '🌧️';
  return '🌡️';
}

// ─── Inverter checkboxes ─────────────────────────────────────────────────────

function renderInverterCheckboxes(side, inverters) {

  if (!inverters || inverters.length <= 1) { container.innerHTML = ''; return; }

  const cbId = sn => `inv-${side}-${sn.replace(/\W/g, '_')}`;
  container.innerHTML = `
    <div class="small text-muted mb-1">${t('label_inverters')}</div>
    <div class="d-flex flex-wrap gap-2">
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="checkbox" id="inv-${side}-all" checked
               onchange="onAllInverterChange('${side}')">
        <label class="form-check-label small fw-semibold" for="inv-${side}-all">${t('label_all')}</label>
      </div>
      ${inverters.map(inv => `
        <div class="form-check form-check-inline mb-0">
          <input class="form-check-input" type="checkbox"
                 id="${cbId(inv.device_sn)}" value="${escapeHtml(inv.device_sn)}" checked
                 onchange="onInverterChange('${side}')">
          <label class="form-check-label small" for="${cbId(inv.device_sn)}">
            ${escapeHtml(inv.friendly_name || inv.device_sn)}
          </label>
        </div>`).join('')}
    </div>`;
}

function onAllInverterChange(side) {
  const state = document.getElementById(`inv-${side}-all`).checked;
  document.querySelectorAll(`#inverters-${side} .form-check-input:not(#inv-${side}-all)`)
    .forEach(cb => { cb.checked = state; });
}

function onInverterChange(side) {
  const all  = document.querySelectorAll(`#inverters-${side} .form-check-input:not(#inv-${side}-all)`);
  const n    = [...all].filter(cb => cb.checked).length;
  const allCb = document.getElementById(`inv-${side}-all`);
  if (allCb) {
    allCb.checked       = (n === all.length);
    allCb.indeterminate = (n > 0 && n < all.length);
  }
}

// Returns array of selected SNs, or [] when all are selected (= no filter)
function getSelectedInverters(side) {
  const all = document.querySelectorAll(`#inverters-${side} .form-check-input:not(#inv-${side}-all)`);
  if (!all.length) return [];
  const checked = [...all].filter(cb => cb.checked).map(cb => cb.value);
  return checked.length === all.length ? [] : checked;
}

// True when at least one inverter is checked (or there are no checkboxes = all)
function hasSelectedInverters(side) {
  const all = document.querySelectorAll(`#inverters-${side} .form-check-input:not(#inv-${side}-all)`);
  return !all.length || [...all].some(cb => cb.checked);
}

// Returns a short label for the selected inverters (empty string = all selected)
function getInverterLabel(side) {
  const all = document.querySelectorAll(`#inverters-${side} .form-check-input:not(#inv-${side}-all)`);
  if (!all.length) return '';
  const checked = [...all].filter(cb => cb.checked);
  if (checked.length === all.length) return '';
  return checked.map(cb => {
    const inv = allInverters.find(i => i.device_sn === cb.value);
    return inv ? escapeHtml(inv.friendly_name || inv.device_sn) : escapeHtml(cb.value);
  }).join(', ');
}

function showAlert(msg) {
  document.getElementById('alert-area').innerHTML =
    `<div class="alert alert-danger alert-dismissible fade show" role="alert">
      ${escapeHtml(msg)}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
}

function clearAlert() {
  document.getElementById('alert-area').innerHTML = '';
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
</script>

</body>
</html>
