<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="page_title">Page title</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <link id="bootstrap-css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script>(function(){var t=localStorage.getItem('deye_theme')||( window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <style>
      .white-text-with-shadow {
        text-shadow: 2pt 2pt 4pt #000000;
        color: #ffffff;
      }

      .darker-img {
        filter: brightness(90%);
      }
      </style>
  </head>
  <body>

    <div class="container">

      <div class="row">
        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/calendar.jpg" class="card-img-top darker-img" alt="Powerplant">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="powerplant_name">
                Powerplant<br />
                01/01/2025<br />
                12:00
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/power_now.jpg" class="card-img-top darker-img" alt="Sunrise">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="power_now">
                Power now<br />
                0,000 W
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/power_today.jpg" class="card-img darker-img" alt="Sunrise">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="power_today">
                Energy today<br />
                0.0 kWh
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/sunrise.jpg" class="card-img darker-img" alt="Weather" id="weather-image">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="weather">
                Weather<br />
                Cloudy, 22°C
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/sunrise.jpg" class="card-img darker-img" alt="Sunrise">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="sunrise">
                Sunrise<br />
                06:00
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/sunset.jpg" class="card-img darker-img" alt="Sunset">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="sunset">
                Sunset<br />
                18:10
              </h4>
            </div>
          </div>
        </div>
        <p></p>
      </div>

      <div class="row my-3 align-items-center justify-content-center g-2">
        <div class="col-auto">
          <div class="btn-group btn-group-sm">
            <button id="btn-prev-month" class="btn btn-outline-secondary" data-i18n="btn_prev_month">‹ Month</button>
            <button id="btn-prev-week"  class="btn btn-outline-secondary" data-i18n="btn_prev_week">‹ Week</button>
            <button id="btn-prev-day"   class="btn btn-outline-secondary" data-i18n="btn_prev_day">‹ Day</button>
          </div>
        </div>
        <div class="col-auto">
          <input type="date" id="nav-date" class="form-control form-control-sm" style="width: auto">
        </div>
        <div class="col-auto">
          <div class="btn-group btn-group-sm">
            <button id="btn-next-day"   class="btn btn-outline-secondary" disabled data-i18n="btn_next_day">Day ›</button>
            <button id="btn-next-week"  class="btn btn-outline-secondary" disabled data-i18n="btn_next_week">Week ›</button>
            <button id="btn-next-month" class="btn btn-outline-secondary" disabled data-i18n="btn_next_month">Month ›</button>
          </div>
        </div>
        <div class="col-auto" id="live-badge-wrapper" style="display:none">
          <button id="btn-live" class="btn btn-success btn-sm" data-i18n="btn_live">● Live</button>
        </div>
        <div class="col-auto">
          <a href="reports.html" class="btn btn-outline-primary btn-sm" data-i18n="btn_reports">Reports</a>
        </div>
        <div class="col-auto">
          <a href="admin/index.html" class="btn btn-outline-secondary btn-sm">Admin</a>
        </div>
      </div>

      <div class="container">
        <div class="row">
          <h2 data-i18n="heading_total_power">Total Power</h2>
          <canvas id="myChart"></canvas>
          <p></p>
        </div>

        <div class="row">
          <h2 data-i18n="heading_individual_inverters">Individual inverters</h2>
        </div>

        <div class="row" id="inverters">

        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="lang/i18n.js"></script>

    <script>
      let colorIndex = 0;
      let colors = ['blue', 'teal', 'purple', 'orange', 'yellow', 'gray', 'brown', 'chocolate', 'khaki', 'coral', 'crimson', 'indigo', 'turquoise', 'amber', 'golden yellow'];
      let colorsrgb = ['rgb(54, 162, 235)', 'rgb(75, 192, 192)', 'rgb(153, 102, 255)', 'rgb(255, 159, 64)', 'rgb(255, 205, 86)', 'rgb(201, 203, 207)', 'rgb(165, 42, 42)', 'rgb(210, 105, 30)', 'rgb(240, 230, 140)', 'rgb(255, 127, 80)', 'rgb(220, 20, 60)', 'rgb(75, 0, 130)', 'rgb(64, 224, 208)', 'rgb(255, 191, 0)', 'rgb(255, 215, 0)'];
      let colorsrgb2 = [[54, 162, 235], [75, 192, 192], [153, 102, 255], [255, 159, 64], [255, 205, 86], [201, 203, 207], [165, 42, 42], [210, 105, 30], [240, 230, 140], [255, 127, 80], [220, 20, 60], [75, 0, 130], [64, 224, 208], [255, 191, 0], [255, 215, 0]];

      let selectedDate = null; // null = live/today; 'YYYY-MM-DD' = historical
      let lastReferenceDate = null; // date string of the last loaded reference_date
      let minDate = null; // earliest date with data, 'YYYY-MM-DD'

      function getApiData() {
        let url = selectedDate ? `overall.php?date=${selectedDate}` : 'overall.php';

        fetch(url)
          .then(response => response.json())
          .then(data => {
            // Sunrise and Sunset are on format "2025-03-10T06:04:39 -03:00" (YYYY-MM-DDTHH:MM:SS -03:00), get the time part
            let dtSunrise = new Date(data.sunrise);
            let sunrise = dtSunrise.toLocaleTimeString(navigator.language, {
              hour: '2-digit',
              minute: '2-digit'
            });

            let dtSunset = new Date(data.sunset);
            let sunset = dtSunset.toLocaleTimeString(navigator.language, {
              hour: '2-digit',
              minute: '2-digit'
            });

            let strDateTime = formatDateTime(data.timestamp);

            let page_title = `${data.powerplant_name}, ${strDateTime}`;
            let powerplant_info = page_title.replaceAll(', ', '<br />');

            // Update weather info
            if (data.latest_weather_data) {
              let weatherInfo = `${translateCondition(data.latest_weather_data.condition)}, ${data.latest_weather_data.temperature}°C`;
              weatherInfo = weatherInfo.charAt(0).toUpperCase() + weatherInfo.slice(1);
              document.getElementById('weather').innerHTML = weatherInfo;
              document.getElementById('weather-image').src = `img/weather_${data.latest_weather_data.icon}.jpg`;
            } else {
              document.getElementById('weather').innerHTML = t('weather_no_data');
            }

            document.getElementById('powerplant_name').innerHTML = powerplant_info;
            document.getElementById('page_title').innerHTML = page_title;
            document.getElementById('sunrise').innerHTML = t('card_sunrise') + '<br />' + sunrise;
            document.getElementById('sunset').innerHTML = t('card_sunset') + '<br />' + sunset;

            if (data.is_historical) {
              let peak_power = data.peak_power_now.toLocaleString(navigator.language);
              document.getElementById('power_now').innerHTML = t('card_peak_power') + '<br />' + peak_power + ' W';
              document.getElementById('power_today').innerHTML = t('card_energy_produced') + '<br />' + data.total_energy_today.toLocaleString() + ' kWh';
            } else {
              let total_power_now = data.total_power_now.toLocaleString(navigator.language);
              document.getElementById('power_now').innerHTML = t('card_power_now') + '<br />' + total_power_now + ' W';
              document.getElementById('power_today').innerHTML = t('card_energy_today') + '<br />' + data.total_energy_today.toLocaleString() + ' kWh';
            }

            // Update date navigation
            lastReferenceDate = data.reference_date.replace(/\s/g, '').split('T')[0];
            if (data.min_date) minDate = data.min_date;
            document.getElementById('nav-date').value = lastReferenceDate;
            document.getElementById('live-badge-wrapper').style.display = data.is_historical ? '' : 'none';
            updateNavButtons();

            updateChart(data.detailed_powerplant_data, data.weather_changes);
            colorIndex = 0;
            updateInvertersCharts(data.detailed_inverter_data, data.latest_inverter_data);
          });
      }

      // Set max to today's local date so the picker blocks future dates
      (function() {
        let now = new Date();
        let todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        document.getElementById('nav-date').max = todayStr;
      })();

      function todayStr() {
        let now = new Date();
        return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
      }

      function navigateDays(delta) {
        let base = new Date((lastReferenceDate || todayStr()) + 'T12:00:00');
        base.setDate(base.getDate() + delta);
        let today = new Date(); today.setHours(0, 0, 0, 0);
        selectedDate = base >= today ? null : base.toISOString().split('T')[0];
        getApiData();
      }

      function updateNavButtons() {
        let current = lastReferenceDate || todayStr();
        let today   = todayStr();
        let isLive  = (current >= today);

        // Prev buttons: disabled if target would be before minDate (or no data at all)
        let canPrevDay   = !minDate || current > minDate;
        let canPrevWeek  = !minDate || addDays(current, -7) >= minDate;
        let canPrevMonth = !minDate || addDays(current, -30) >= minDate;

        document.getElementById('btn-prev-day').disabled   = !canPrevDay;
        document.getElementById('btn-prev-week').disabled  = !canPrevWeek;
        document.getElementById('btn-prev-month').disabled = !canPrevMonth;

        // Next buttons: disabled when navigating would land on or past today
        document.getElementById('btn-next-day').disabled   = isLive;
        document.getElementById('btn-next-week').disabled  = addDays(current, 7) >= today;
        document.getElementById('btn-next-month').disabled = addDays(current, 30) >= today;

        // Keep the date picker min in sync
        if (minDate) document.getElementById('nav-date').min = minDate;
      }

      function addDays(dateStr, days) {
        let d = new Date(dateStr + 'T12:00:00');
        d.setDate(d.getDate() + days);
        return d.toISOString().split('T')[0];
      }

      document.getElementById('nav-date').addEventListener('change', function() {
        let picked = this.value;
        if (!picked) return;
        let today = new Date(); today.setHours(0, 0, 0, 0);
        let pickedDate = new Date(picked + 'T12:00:00');
        selectedDate = pickedDate >= today ? null : picked;
        getApiData();
      });

      document.getElementById('btn-prev-day').addEventListener('click',   () => navigateDays(-1));
      document.getElementById('btn-prev-week').addEventListener('click',  () => navigateDays(-7));
      document.getElementById('btn-prev-month').addEventListener('click', () => navigateDays(-30));
      document.getElementById('btn-next-day').addEventListener('click',   () => navigateDays(1));
      document.getElementById('btn-next-week').addEventListener('click',  () => navigateDays(7));
      document.getElementById('btn-next-month').addEventListener('click', () => navigateDays(30));

      document.getElementById('btn-live').addEventListener('click', function() {
        selectedDate = null;
        getApiData();
      });

      function updateInvertersCharts(data, latestData) {
        // data has the following structure: [{"time": "2025-03-11T09:15:00Z", "device_sn": "3896126058", "power_now": "0"}]
        // latestData has the following structure: [{"device_sn": "3896126058", "power_now": "0", "energy_today": "0.0", "energy_total": "0.0", "friendly_name": "Inverter 1"}]

        // Get the unique inverters serial numbers
        let inverters = data.map(d => d.device_sn);
        inverters = inverters.filter((value, index, self) => self.indexOf(value) === index);

        // Create the divs and canvas for each inverter
        let invertersHtml = '';
        inverters.forEach(inverter => {
          invertersHtml += `<div class="col-12 col-md-6 col-lg-6">
            <canvas id="inverter_${inverter}"></canvas>
          </div>`;
        });

        document.getElementById('inverters').innerHTML = invertersHtml;

        // For each inverter, filter the data and create the chart
        inverters.forEach(inverter => {
          let inverterData = data.filter(d => d.device_sn === inverter);
          let inverterFriendlyName = latestData.find(d => d.device_sn === inverter)?.friendly_name || `Inverter ${inverter}`;

          updateInverterChart(inverterData, inverter, colorsrgb2[colorIndex], inverterFriendlyName);

          colorIndex++;
          if(colorIndex >= colorsrgb2.length) {
            colorIndex = 0;
          }

        });
      }

      function updateInverterChart(data, inverter, color, friendlyName) {
        let ctx = document.getElementById(`inverter_${inverter}`);

        let chartStatus = Chart.getChart(`inverter_${inverter}`);
        if (chartStatus != undefined) {
          chartStatus.destroy();
        }

        let labels = data.map(d => d.time);
        labels = labels.map(l => {
          let date = new Date(l);
          return date.toLocaleTimeString(navigator.language, {
            hour: '2-digit',
            minute: '2-digit'
          });
        });

        let radiatorValues = data.map(d =>
          d.radiator_temp !== null && d.radiator_temp !== '' && d.radiator_temp !== undefined ? parseFloat(d.radiator_temp) : null
        );
        const hasRadiator = radiatorValues.some(v => v !== null);

        const lastEnergy = [...data].reverse().find(d => d.energy_today != null)?.energy_today ?? '?';
        const hasPvInputs = data.some(d => d.pv_inputs && Object.keys(d.pv_inputs).length > 0);

        let datasets;
        let chartTitle = null;
        let yStacked = false;

        if (hasPvInputs) {
          const pvNumbers = [...new Set(
            data.flatMap(d => d.pv_inputs ? Object.keys(d.pv_inputs).map(Number) : [])
          )].sort((a, b) => a - b);

          const pvColors = [
            [255, 159,  64],  // PV1: orange
            [ 54, 162, 235],  // PV2: blue
            [ 75, 192, 192],  // PV3: teal
            [153, 102, 255],  // PV4: purple
          ];

          datasets = pvNumbers.map((pvNum, idx) => {
            const c = pvColors[idx % pvColors.length];
            return {
              label: `PV${pvNum}`,
              fill: idx === 0 ? 'origin' : '-1',
              data: data.map(d => d.pv_inputs ? (d.pv_inputs[pvNum] ?? null) : null),
              borderColor: `rgb(${c[0]}, ${c[1]}, ${c[2]})`,
              backgroundColor: `rgba(${c[0]}, ${c[1]}, ${c[2]}, 0.4)`,
              borderWidth: 1,
              tension: 0.5,
              spanGaps: true,
              pointRadius: 0,
              yAxisID: 'y',
              stack: 'pv',
              order: 1,
            };
          });

          chartTitle = `${friendlyName} — ${lastEnergy} kWh`;
          yStacked = true;
        } else {
          let borderColor = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
          let backgroundColor = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.2)`;
          datasets = [{
            label: `${friendlyName} - ${lastEnergy} kWh`,
            fill: true,
            data: data.map(d => d.power_now),
            borderColor: borderColor,
            backgroundColor: backgroundColor,
            borderWidth: 1,
            tension: 0.5,
            pointRadius: 0,
            yAxisID: 'y',
            order: 1,
          }];
        }

        if (hasRadiator) {
          datasets.unshift({
            label: t('chart_radiator_temp'),
            data: radiatorValues,
            borderColor: 'rgb(255, 99, 132)',
            backgroundColor: 'rgba(255, 99, 132, 0.1)',
            borderWidth: 1.5,
            tension: 0.5,
            fill: false,
            spanGaps: true,
            pointRadius: 0,
            yAxisID: 'y2',
            order: 2,
          });
        }

        new Chart(ctx, {
          type: 'line',
          data: { labels, datasets },
          options: {
            plugins: {
              ...(chartTitle ? { title: { display: true, text: chartTitle } } : {}),
            },
            scales: {
              y: {
                beginAtZero: true,
                stacked: yStacked,
              },
              ...(hasRadiator ? {
                y2: {
                  position: 'right',
                  grid: { drawOnChartArea: false },
                  title: { display: true, text: '°C' },
                  min: 0,
                  max: 90,
                }
              } : {})
            }
          }
        });
      }

      function conditionToEmoji(condition) {
        if (!condition) return '🌡️';
        const c = condition.toLowerCase();
        if (c === 'clear sky' || c === 'mainly clear') return '☀️';
        if (c === 'partly cloudy') return '🌤️';
        if (c === 'overcast') return '☁️';
        if (c.includes('fog')) return '🌫️';
        if (c.includes('thunder') || c.includes('storm')) return '⛈️';
        if (c.includes('snow')) return '❄️';
        if (c.includes('drizzle') || c.includes('rain') || c.includes('shower')) return '🌧️';
        return '🌡️';
      }

      const weatherAnnotationsPlugin = {
        id: 'weatherAnnotations',
        afterDraw(chart, args, options) {
          const changes = options.changes;
          const rawTimes = options.rawTimes;
          if (!changes || !changes.length || !rawTimes || !rawTimes.length) return;

          const ctx = chart.ctx;
          const xScale = chart.scales.x;
          const chartArea = chart.chartArea;

          changes.forEach(change => {
            const changeMs = new Date(change.time).getTime();

            // Find the index of the closest data point in the chart
            let closestIdx = 0, minDiff = Infinity;
            rawTimes.forEach((t, i) => {
              const diff = Math.abs(new Date(t).getTime() - changeMs);
              if (diff < minDiff) { minDiff = diff; closestIdx = i; }
            });

            const x = xScale.getPixelForValue(closestIdx);
            const emoji = conditionToEmoji(change.condition);

            ctx.save();

            // Dashed vertical line
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(128, 128, 128, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();

            // Emoji label
            ctx.setLineDash([]);
            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(emoji, x, chartArea.top + 4);

            ctx.restore();
          });
        }
      };

      function updateChart(data, weatherChanges) {
        let ctx = document.getElementById('myChart');
        let chartStatus = Chart.getChart('myChart');
        if (chartStatus != undefined) { chartStatus.destroy(); }

        let rawTimes = data.map(d => d.time);
        let labels = rawTimes.map(t => {
          return new Date(t).toLocaleTimeString(navigator.language, {
            hour: '2-digit', minute: '2-digit'
          });
        });

        let values = data.map(d => d.total_power_now);
        let radiatorValues = data.map(d =>
          d.max_radiator_temp !== null && d.max_radiator_temp !== '' ? parseFloat(d.max_radiator_temp) : null
        );
        const hasRadiator = radiatorValues.some(v => v !== null);

        const datasets = [{
          label: t('chart_total_power'),
          fill: true,
          data: values,
          borderColor: 'rgb(54, 162, 235)',
          backgroundColor: 'rgba(54, 162, 235, 0.2)',
          borderWidth: 1,
          tension: 0.5,
          pointRadius: 0,
          yAxisID: 'y',
        }];

        if (hasRadiator) {
          datasets.push({
            label: t('chart_radiator_temp'),
            data: radiatorValues,
            borderColor: 'rgb(255, 99, 132)',
            backgroundColor: 'rgba(255, 99, 132, 0.1)',
            borderWidth: 1.5,
            tension: 0.5,
            fill: false,
            spanGaps: true,
            pointRadius: 0,
            yAxisID: 'y2',
          });
        }

        new Chart(ctx, {
          type: 'line',
          plugins: [weatherAnnotationsPlugin],
          data: { labels, datasets },
          options: {
            plugins: {
              weatherAnnotations: {
                changes: weatherChanges || [],
                rawTimes: rawTimes
              }
            },
            scales: {
              y: { beginAtZero: true },
              ...(hasRadiator ? {
                y2: {
                  position: 'right',
                  grid: { drawOnChartArea: false },
                  title: { display: true, text: '°C' },
                  min: 0,
                  max: 90,
                }
              } : {})
            }
          }
        });
      }

      function formatDateTime(dateTime) {
        // Receives a date and time in the format "2025-03-10T06:04:39Z" (YYYY-MM-DDTHH:MM:SS UTC) and returns it formatted
        // as "10/03/2025 06:04" on local timezone

        // Remove spaces from dateTime if any
        dateTime = dateTime.replace(/\s/g, '');

        let dateObj = new Date(dateTime);
        return dateObj.toLocaleString(navigator.language, {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'});
      }

      function getTheme() {
        return localStorage.getItem('deye_theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-bs-theme', theme);
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
      }

      function toggleTheme() {
        const next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('deye_theme', next);
        applyTheme(next);
      }

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (!localStorage.getItem('deye_theme')) applyTheme(getTheme());
      });
      i18nInit().then(() => {
        getApiData();
        setInterval(function() {
          if (selectedDate === null) getApiData();
        }, 60000);
      });

    </script>

      <select class="form-select form-select-sm lang-switcher" style="width:auto"></select>
    </div>
  </footer>

  <script>applyTheme(getTheme());</script>
