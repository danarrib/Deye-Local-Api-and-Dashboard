<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="page_title">Page title</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
      .white-text-with-shadow {
        text-shadow: 2pt 2pt 4pt #000000;
        color: #ffffff;
      }

      .darker-img {
        filter: brightness(90%);
      }
      </style>
  </head>
  <body>

    <div class="container">

      <div class="row">
        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/calendar.jpg" class="card-img-top darker-img" alt="Powerplant">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="powerplant_name">
                Powerplant<br />
                01/01/2025<br />
                12:00
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/power_now.jpg" class="card-img-top darker-img" alt="Sunrise">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="power_now">
                Power now<br />
                0,000 W
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/power_today.jpg" class="card-img darker-img" alt="Sunrise">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="power_today">
                Energy today<br />
                0.0 kWh
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/sunrise.jpg" class="card-img darker-img" alt="Weather" id="weather-image">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="weather">
                Weather<br />
                Cloudy, 22°C
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/sunrise.jpg" class="card-img darker-img" alt="Sunrise">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="sunrise">
                Sunrise<br />
                06:00
              </h4>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-4 col-lg-4 col-xl-2 mt-4">
          <div class="card text-center">
            <img src="img/sunset.jpg" class="card-img darker-img" alt="Sunset">
            <div class="card-img-overlay white-text-with-shadow align-items-center d-flex justify-content-center">
              <h4 class="card-title" id="sunset">
                Sunset<br />
                18:10
              </h4>
            </div>
          </div>
        </div>
        <p></p>
      </div>

      <div class="row my-3 align-items-center justify-content-center">
        <div class="col-auto">
          <button id="btn-prev-day" class="btn btn-outline-secondary btn-sm">&lsaquo; Prev</button>
        </div>
        <div class="col-auto">
          <input type="date" id="nav-date" class="form-control form-control-sm" style="width: auto">
        </div>
        <div class="col-auto">
          <button id="btn-next-day" class="btn btn-outline-secondary btn-sm" disabled>Next &rsaquo;</button>
        </div>
        <div class="col-auto" id="live-badge-wrapper" style="display:none">
          <button id="btn-live" class="btn btn-success btn-sm">&#9679; Live</button>
        </div>
        <div class="col-auto">
          <a href="reports.html" class="btn btn-outline-primary btn-sm">Reports</a>
        </div>
      </div>

      <div class="container">
        <div class="row">
          <h2>Total Power</h2>
          <canvas id="myChart"></canvas>
          <p></p>
        </div>

        <div class="row">
          <h2>Individual inverters</h2>
        </div>

        <div class="row" id="inverters">

        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <script>
      let colorIndex = 0;
      let colors = ['red', 'blue', 'green', 'purple', 'orange', 'brown', 'pink', 'gray', 'cyan'];
      let colorsrgb = ['rgb(255, 99, 132)', 'rgb(54, 162, 235)', 'rgb(75, 192, 192)', 'rgb(153, 102, 255)', 'rgb(255, 159, 64)', 'rgb(255, 205, 86)', 'rgb(201, 203, 207)', 'rgb(75, 192, 192)', 'rgb(54, 162, 235)'];
      let colorsrgb2 = [[255, 99, 132], [54, 162, 235], [75, 192, 192], [153, 102, 255], [255, 159, 64], [255, 205, 86], [201, 203, 207], [75, 192, 192], [54, 162, 235]];

      let selectedDate = null; // null = live/today; 'YYYY-MM-DD' = historical
      let lastReferenceDate = null; // date string of the last loaded reference_date

      function getApiData() {
        let url = selectedDate ? `overall.php?date=${selectedDate}` : 'overall.php';

        fetch(url)
          .then(response => response.json())
          .then(data => {
            // Sunrise and Sunset are on format "2025-03-10T06:04:39 -03:00" (YYYY-MM-DDTHH:MM:SS -03:00), get the time part
            let dtSunrise = new Date(data.sunrise);
            let sunrise = dtSunrise.toLocaleTimeString(navigator.language, {
              hour: '2-digit',
              minute: '2-digit'
            });

            let dtSunset = new Date(data.sunset);
            let sunset = dtSunset.toLocaleTimeString(navigator.language, {
              hour: '2-digit',
              minute: '2-digit'
            });

            let strDateTime = formatDateTime(data.timestamp);

            let page_title = `${data.powerplant_name}, ${strDateTime}`;
            let powerplant_info = page_title.replaceAll(', ', '<br />');

            // Update weather info
            if (data.latest_weather_data) {
              let weatherInfo = `${data.latest_weather_data.condition}, ${data.latest_weather_data.temperature}°C`;
              weatherInfo = weatherInfo.charAt(0).toUpperCase() + weatherInfo.slice(1);
              document.getElementById('weather').innerHTML = weatherInfo;
              document.getElementById('weather-image').src = `img/weather_${data.latest_weather_data.icon}.jpg`;
            } else {
              document.getElementById('weather').innerHTML = 'No data';
            }

            document.getElementById('powerplant_name').innerHTML = powerplant_info;
            document.getElementById('page_title').innerHTML = page_title;
            document.getElementById('sunrise').innerHTML = `Sunrise<br />${sunrise}`;
            document.getElementById('sunset').innerHTML = `Sunset<br />${sunset}`;

            if (data.is_historical) {
              let peak_power = data.peak_power_now.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
              document.getElementById('power_now').innerHTML = `Peak power<br />${peak_power} W`;
              document.getElementById('power_today').innerHTML = `Energy produced<br />${data.total_power_today.toLocaleString()} kWh`;
            } else {
              let total_power_now = data.total_power_now.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
              document.getElementById('power_now').innerHTML = `Power now<br />${total_power_now} W`;
              document.getElementById('power_today').innerHTML = `Energy today<br />${data.total_power_today.toLocaleString()} kWh`;
            }

            // Update date navigation
            lastReferenceDate = data.reference_date.replace(/\s/g, '').split('T')[0];
            document.getElementById('nav-date').value = lastReferenceDate;
            document.getElementById('btn-next-day').disabled = !data.is_historical;
            document.getElementById('live-badge-wrapper').style.display = data.is_historical ? '' : 'none';

            updateChart(data.detailed_powerplant_data, data.weather_changes);
            colorIndex = 0;
            updateInvertersCharts(data.detailed_inverter_data, data.latest_inverter_data);
          });
      }

      // Set max to today's local date so the picker blocks future dates
      (function() {
        let now = new Date();
        let todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        document.getElementById('nav-date').max = todayStr;
      })();

      document.getElementById('nav-date').addEventListener('change', function() {
        let picked = this.value; // YYYY-MM-DD
        if (!picked) return;
        let today = new Date();
        today.setHours(0, 0, 0, 0);
        let pickedDate = new Date(picked + 'T12:00:00');
        selectedDate = pickedDate >= today ? null : picked;
        getApiData();
      });

      document.getElementById('btn-prev-day').addEventListener('click', function() {
        let base = new Date((lastReferenceDate || new Date().toISOString().split('T')[0]) + 'T12:00:00');
        base.setDate(base.getDate() - 1);
        selectedDate = base.toISOString().split('T')[0];
        getApiData();
      });

      document.getElementById('btn-next-day').addEventListener('click', function() {
        if (!selectedDate) return;
        let base = new Date(selectedDate + 'T12:00:00');
        base.setDate(base.getDate() + 1);
        let today = new Date();
        today.setHours(0, 0, 0, 0);
        if (base >= today) {
          selectedDate = null;
        } else {
          selectedDate = base.toISOString().split('T')[0];
        }
        getApiData();
      });

      document.getElementById('btn-live').addEventListener('click', function() {
        selectedDate = null;
        getApiData();
      });

      function updateInvertersCharts(data, latestData) {
        // data has the following structure: [{"time": "2025-03-11T09:15:00Z", "device_sn": "3896126058", "power_now": "0"}]
        // latestData has the following structure: [{"device_sn": "3896126058", "power_now": "0", "power_today": "0.0", "power_total": "0.0", "friendly_name": "Inverter 1"}]

        // Get the unique inverters serial numbers
        let inverters = data.map(d => d.device_sn);
        inverters = inverters.filter((value, index, self) => self.indexOf(value) === index);

        // Create the divs and canvas for each inverter
        let invertersHtml = '';
        inverters.forEach(inverter => {
          invertersHtml += `<div class="col-12 col-md-6 col-lg-6">
            <canvas id="inverter_${inverter}"></canvas>
          </div>`;
        });

        document.getElementById('inverters').innerHTML = invertersHtml;

        // For each inverter, filter the data and create the chart
        inverters.forEach(inverter => {
          let inverterData = data.filter(d => d.device_sn === inverter);
          let inverterFriendlyName = latestData.find(d => d.device_sn === inverter)?.friendly_name || `Inverter ${inverter}`;

          updateInverterChart(inverterData, inverter, colorsrgb2[colorIndex], inverterFriendlyName);

          colorIndex++;
          if(colorIndex >= colorsrgb2.length) {
            colorIndex = 0;
          }

        });
      }

      function updateInverterChart(data, inverter, color, friendlyName) {
        let ctx = document.getElementById(`inverter_${inverter}`);

        let chartStatus = Chart.getChart(`inverter_${inverter}`); // <canvas> id
        if (chartStatus != undefined) {
          chartStatus.destroy();
        }

        let borderColor = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
        let backgroundColor = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.2)`;

        let labels = data.map(d => d.time);
        // Convert the times from UTC to local
        labels = labels.map(l => {
          let date = new Date(l);
          return date.toLocaleTimeString(navigator.language, {
            hour: '2-digit',
            minute: '2-digit'
          });
        });

        let values = data.map(d => d.power_now);

        new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: `${friendlyName} Power (${inverter}) - ${data[data.length - 1].power_today} kWh`,
            fill: true,
            data: values,
            borderColor: borderColor,
            backgroundColor: backgroundColor,
            borderWidth: 1,
            tension: 0.5
          }]
        },
        options: {
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
      }

      function conditionToEmoji(condition) {
        if (!condition) return '🌡️';
        const c = condition.toLowerCase();
        if (c === 'clear sky' || c === 'mainly clear') return '☀️';
        if (c === 'partly cloudy') return '🌤️';
        if (c === 'overcast') return '☁️';
        if (c.includes('fog')) return '🌫️';
        if (c.includes('thunder') || c.includes('storm')) return '⛈️';
        if (c.includes('snow')) return '❄️';
        if (c.includes('drizzle') || c.includes('rain') || c.includes('shower')) return '🌧️';
        return '🌡️';
      }

      const weatherAnnotationsPlugin = {
        id: 'weatherAnnotations',
        afterDraw(chart, args, options) {
          const changes = options.changes;
          const rawTimes = options.rawTimes;
          if (!changes || !changes.length || !rawTimes || !rawTimes.length) return;

          const ctx = chart.ctx;
          const xScale = chart.scales.x;
          const chartArea = chart.chartArea;

          changes.forEach(change => {
            const changeMs = new Date(change.time).getTime();

            // Find the index of the closest data point in the chart
            let closestIdx = 0, minDiff = Infinity;
            rawTimes.forEach((t, i) => {
              const diff = Math.abs(new Date(t).getTime() - changeMs);
              if (diff < minDiff) { minDiff = diff; closestIdx = i; }
            });

            const x = xScale.getPixelForValue(closestIdx);
            const emoji = conditionToEmoji(change.condition);

            ctx.save();

            // Dashed vertical line
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(128, 128, 128, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();

            // Emoji label
            ctx.setLineDash([]);
            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(emoji, x, chartArea.top + 4);

            ctx.restore();
          });
        }
      };

      function updateChart(data, weatherChanges) {
        let ctx = document.getElementById('myChart');
        let chartStatus = Chart.getChart('myChart'); // <canvas> id
        if (chartStatus != undefined) {
          chartStatus.destroy();
        }

        let rawTimes = data.map(d => d.time);
        let labels = rawTimes.map(t => {
          return new Date(t).toLocaleTimeString(navigator.language, {
            hour: '2-digit',
            minute: '2-digit'
          });
        });

        let values = data.map(d => d.total_power_now);

        new Chart(ctx, {
          type: 'line',
          plugins: [weatherAnnotationsPlugin],
          data: {
            labels: labels,
            datasets: [{
              label: 'Total Power',
              fill: true,
              data: values,
              borderWidth: 1,
              tension: 0.5
            }]
          },
          options: {
            plugins: {
              weatherAnnotations: {
                changes: weatherChanges || [],
                rawTimes: rawTimes
              }
            },
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      }

      function formatDateTime(dateTime) {
        // Receives a date and time in the format "2025-03-10T06:04:39Z" (YYYY-MM-DDTHH:MM:SS UTC) and returns it formatted
        // as "10/03/2025 06:04" on local timezone

        // Remove spaces from dateTime if any
        dateTime = dateTime.replace(/\s/g, '');

        let dateObj = new Date(dateTime);
        return dateObj.toLocaleString(navigator.language, {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'});
      }

      function detectAndSetDarkMode() {
        // Check to see if Media-Queries are supported
        var htmlElement = document.getElementsByTagName('html')[0];
        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            detectAndSetDarkMode();
          });

          // Check if the dark-mode Media-Query matches
          if(window.matchMedia('(prefers-color-scheme: dark)').matches){
            // Add atribute data-bs-theme="dark" to the html tag
            htmlElement.setAttribute('data-bs-theme', 'dark');
          } else {
            // Light
            htmlElement.setAttribute('data-bs-theme', 'light');
          }
        } else {
          // Default (when Media-Queries are not supported)
            htmlElement.setAttribute('data-bs-theme', 'light');
        }
      }

      detectAndSetDarkMode();
      getApiData();

      var intervalId = window.setInterval(function(){
        if (selectedDate === null) {
          getApiData();
        }
      }, 60000);
      


    </script>


  </body>
</html>
